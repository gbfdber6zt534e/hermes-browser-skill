<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hermes Browser Agent — WebGUI</title>
<style>
  :root {
    --bg: #0f0f13;
    --card: #1a1a24;
    --border: #2a2a3a;
    --accent: #7c6af7;
    --accent2: #3ecf8e;
    --warn: #f7a635;
    --err: #f75b5b;
    --text: #e2e2f0;
    --muted: #6b6b8a;
    --font: 'Segoe UI', system-ui, sans-serif;
    --mono: 'Cascadia Code', 'Fira Code', monospace;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: var(--font); font-size: 14px; }
  header { background: var(--card); border-bottom: 1px solid var(--border); padding: 14px 24px;
    display: flex; align-items: center; gap: 16px; }
  header h1 { font-size: 16px; font-weight: 600; }
  header .badge { background: var(--accent); color: #fff; border-radius: 4px; padding: 2px 8px;
    font-size: 11px; font-weight: 700; letter-spacing: .5px; }
  .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--err); display: inline-block;
    margin-right: 6px; transition: background .3s; }
  .dot.online { background: var(--accent2); box-shadow: 0 0 8px var(--accent2); }
  main { display: grid; grid-template-columns: 1fr 1fr; grid-template-rows: auto auto auto;
    gap: 16px; padding: 20px 24px; max-width: 1400px; margin: 0 auto; }
  .card { background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 18px; }
  .card h2 { font-size: 13px; font-weight: 600; color: var(--muted); text-transform: uppercase;
    letter-spacing: .8px; margin-bottom: 14px; }
  /* Status Grid */
  .status-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .stat { background: var(--bg); border: 1px solid var(--border); border-radius: 8px; padding: 12px; }
  .stat .label { font-size: 11px; color: var(--muted); margin-bottom: 4px; }
  .stat .value { font-size: 20px; font-weight: 700; color: var(--accent); font-family: var(--mono); }
  .stat .value.ok { color: var(--accent2); }
  .stat .value.err { color: var(--err); }
  /* Terminal */
  #terminal { background: #0a0a10; border: 1px solid var(--border); border-radius: 8px;
    font-family: var(--mono); font-size: 12px; height: 180px; overflow-y: auto; padding: 10px;
    grid-column: 1 / -1; }
  .log-line { padding: 2px 0; display: flex; gap: 8px; }
  .log-line .ts { color: var(--muted); min-width: 60px; }
  .log-line .msg.info { color: #8888bb; }
  .log-line .msg.ok { color: var(--accent2); }
  .log-line .msg.warn { color: var(--warn); }
  .log-line .msg.error { color: var(--err); font-weight: 600; }
  /* Controls */
  .controls { grid-column: 1 / -1; }
  .control-group { margin-bottom: 14px; }
  .control-group label { display: block; font-size: 11px; color: var(--muted); margin-bottom: 5px; }
  .row { display: flex; gap: 8px; }
  input[type=text], input[type=number], select, textarea {
    background: var(--bg); border: 1px solid var(--border); border-radius: 6px;
    color: var(--text); padding: 7px 10px; font-family: var(--font); font-size: 13px;
    outline: none; transition: border-color .2s; }
  input[type=text]:focus, textarea:focus { border-color: var(--accent); }
  input[type=text] { flex: 1; }
  textarea { width: 100%; height: 60px; resize: vertical; }
  button { background: var(--accent); color: #fff; border: none; border-radius: 6px;
    padding: 7px 16px; cursor: pointer; font-size: 13px; font-weight: 600;
    transition: opacity .15s; white-space: nowrap; }
  button:hover { opacity: .85; }
  button.secondary { background: var(--border); color: var(--text); }
  button.danger { background: var(--err); }
  button.success { background: var(--accent2); color: #0a1a12; }
  /* Screenshot */
  #screenshot-img { width: 100%; border-radius: 6px; border: 1px solid var(--border);
    margin-top: 10px; display: none; }
  /* Perplexity Section */
  .pplx-status { display: flex; align-items: center; gap: 10px; padding: 10px 14px;
    background: var(--bg); border-radius: 8px; border: 1px solid var(--border); margin-bottom: 10px; }
  .pplx-badge { font-size: 11px; font-weight: 700; padding: 3px 8px; border-radius: 4px;
    background: var(--err); color: #fff; }
  .pplx-badge.active { background: var(--accent2); color: #0a1a12; }
  /* Tab system */
  .tabs { display: flex; gap: 4px; margin-bottom: 16px; }
  .tab { padding: 6px 14px; border-radius: 6px; cursor: pointer; font-size: 13px;
    color: var(--muted); border: 1px solid transparent; transition: all .15s; }
  .tab.active { background: var(--accent); color: #fff; }
  .tab:hover:not(.active) { border-color: var(--border); color: var(--text); }
  .tab-content { display: none; }
  .tab-content.active { display: block; }
  @media (max-width: 900px) { main { grid-template-columns: 1fr; } }
</style>
</head>
<body>
<header>
  <span class="dot" id="browser-dot"></span>
  <h1>Hermes Browser Agent</h1>
  <span class="badge">v1.0</span>
  <span style="margin-left:auto;color:var(--muted);font-size:12px" id="uptime">—</span>
</header>

<main>
  <!-- Status Cards -->
  <div class="card">
    <h2>System Status</h2>
    <div class="status-grid">
      <div class="stat"><div class="label">Browser Agent</div><div class="value ok" id="s-browser">—</div></div>
      <div class="stat"><div class="label">Perplexity Bridge</div><div class="value" id="s-pplx">—</div></div>
      <div class="stat"><div class="label">Requests</div><div class="value" id="s-reqs">0</div></div>
      <div class="stat"><div class="label">Aktuelle URL</div><div class="value" id="s-url" style="font-size:11px;word-break:break-all">—</div></div>
    </div>
  </div>

  <!-- Perplexity Session -->
  <div class="card">
    <h2>Perplexity Auth2API</h2>
    <div class="pplx-status">
      <span class="pplx-badge" id="pplx-badge">OFFLINE</span>
      <span id="pplx-detail" style="font-size:12px;color:var(--muted)">Session nicht geladen</span>
    </div>
    <div class="control-group">
      <label>Schnell-Test (Perplexity API)</label>
      <div class="row">
        <input type="text" id="pplx-query" placeholder="Testfrage eingeben..." />
        <button onclick="testPplx()">Fragen</button>
      </div>
    </div>
    <div id="pplx-result" style="margin-top:10px;font-size:12px;color:var(--accent2);display:none"></div>
  </div>

  <!-- Browser Controls -->
  <div class="card controls">
    <h2>Browser Steuerung</h2>
    <div class="tabs">
      <div class="tab active" onclick="switchTab('navigate')">Navigate</div>
      <div class="tab" onclick="switchTab('interact')">Interact</div>
      <div class="tab" onclick="switchTab('read')">Read</div>
      <div class="tab" onclick="switchTab('eval')">JS Eval</div>
    </div>

    <!-- Navigate Tab -->
    <div class="tab-content active" id="tab-navigate">
      <div class="control-group">
        <label>URL öffnen</label>
        <div class="row">
          <input type="text" id="nav-url" placeholder="https://www.perplexity.ai" />
          <button onclick="doNavigate()">Go</button>
        </div>
      </div>
      <div class="control-group">
        <label>Quick Links</label>
        <div class="row" style="flex-wrap:wrap;gap:6px">
          <button class="secondary" onclick="quickNav('https://www.perplexity.ai')">Perplexity</button>
          <button class="secondary" onclick="quickNav('https://github.com')">GitHub</button>
          <button class="secondary" onclick="quickNav('https://www.google.com')">Google</button>
          <button class="secondary" onclick="quickNav('http://127.0.0.1:8319/health')">PPLX Health</button>
        </div>
      </div>
      <div class="control-group">
        <label>Scroll</label>
        <div class="row">
          <button class="secondary" onclick="doScroll('top')">↑ Top</button>
          <button class="secondary" onclick="doScroll('up')">↑ Up</button>
          <button class="secondary" onclick="doScroll('down')">↓ Down</button>
          <button class="secondary" onclick="doScroll('bottom')">↓ Bottom</button>
          <button class="danger" onclick="doClose()">Browser schließen</button>
        </div>
      </div>
    </div>

    <!-- Interact Tab -->
    <div class="tab-content" id="tab-interact">
      <div class="control-group">
        <label>Klicken (CSS Selektor / Text / Role)</label>
        <div class="row">
          <input type="text" id="click-sel" placeholder="button.submit oder 'Senden'" />
          <select id="click-method" style="width:80px">
            <option>css</option><option>text</option><option>role</option>
          </select>
          <button onclick="doClick()">Klick</button>
        </div>
      </div>
      <div class="control-group">
        <label>Text tippen</label>
        <div class="row">
          <input type="text" id="type-sel" placeholder="CSS Selektor (z.B. textarea)" style="flex:.4" />
          <input type="text" id="type-text" placeholder="Text eingeben" />
          <button onclick="doType()">Tippen</button>
        </div>
      </div>
      <div class="control-group">
        <label>Tastendruck</label>
        <div class="row" style="flex-wrap:wrap;gap:6px">
          <button class="secondary" onclick="doKey('Enter')">Enter</button>
          <button class="secondary" onclick="doKey('Escape')">Escape</button>
          <button class="secondary" onclick="doKey('Tab')">Tab</button>
          <button class="secondary" onclick="doKey('ArrowDown')">↓</button>
          <button class="secondary" onclick="doKey('ArrowUp')">↑</button>
        </div>
      </div>
    </div>

    <!-- Read Tab -->
    <div class="tab-content" id="tab-read">
      <div class="control-group">
        <label>Text lesen (CSS Selektor)</label>
        <div class="row">
          <input type="text" id="read-sel" placeholder="body" />
          <button onclick="doGetText()">Lesen</button>
        </div>
      </div>
      <div id="read-result" style="margin-top:10px;background:var(--bg);border:1px solid var(--border);
        border-radius:6px;padding:10px;font-size:12px;font-family:var(--mono);max-height:200px;
        overflow-y:auto;white-space:pre-wrap;display:none"></div>
      <div class="control-group" style="margin-top:14px">
        <label>Screenshot</label>
        <button onclick="doScreenshot()">Screenshot machen</button>
      </div>
      <img id="screenshot-img" alt="Screenshot" />
    </div>

    <!-- JS Eval Tab -->
    <div class="tab-content" id="tab-eval">
      <div class="control-group">
        <label>JavaScript auf der Seite ausführen</label>
        <textarea id="eval-script" placeholder="document.title"></textarea>
        <div class="row" style="margin-top:8px">
          <button onclick="doEval()">Ausführen</button>
          <button class="secondary" onclick="document.getElementById('eval-script').value='document.title'">title</button>
          <button class="secondary" onclick="document.getElementById('eval-script').value=\"document.querySelectorAll('a').length + ' Links'\"">Links zählen</button>
        </div>
      </div>
      <div id="eval-result" style="margin-top:10px;font-size:12px;color:var(--accent2);font-family:var(--mono);display:none"></div>
    </div>
  </div>

  <!-- Terminal Log -->
  <div class="card" style="grid-column: 1 / -1">
    <h2 style="display:flex;align-items:center;justify-content:space-between">
      Terminal Log
      <button class="secondary" style="font-size:11px;padding:3px 10px" onclick="clearLogs()">Clear</button>
    </h2>
    <div id="terminal"></div>
  </div>
</main>

<script>
const BROWSER_URL = 'http://127.0.0.1:7421';
const PPLX_URL    = 'http://127.0.0.1:8319';
let PPLX_KEY = localStorage.getItem('pplx_key') || '';
let localLogs = [];

// ── Utils ──────────────────────────────────────────────────────────────────
function addLog(level, msg) {
  const entry = { ts: new Date().toLocaleTimeString('de-DE', {hour:'2-digit',minute:'2-digit',second:'2-digit'}), level, msg };
  localLogs.push(entry);
  if (localLogs.length > 200) localLogs.shift();
  renderLogs();
}

function renderLogs() {
  const t = document.getElementById('terminal');
  t.innerHTML = localLogs.map(l =>
    `<div class="log-line"><span class="ts">${l.ts}</span><span class="msg ${l.level}">${escHtml(l.msg)}</span></div>`
  ).join('');
  t.scrollTop = t.scrollHeight;
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function clearLogs() { localLogs = []; renderLogs(); }

async function api(path, method='GET', body=null) {
  try {
    const opts = { method, headers: {'Content-Type':'application/json'} };
    if (body) opts.body = JSON.stringify(body);
    const r = await fetch(BROWSER_URL + path, opts);
    const data = await r.json();
    return data;
  } catch(e) {
    addLog('error', `API Fehler ${path}: ${e.message}`);
    return { ok: false, error: e.message };
  }
}

// ── Status Polling ─────────────────────────────────────────────────────────
async function pollStatus() {
  // Browser Agent
  const s = await api('/status');
  const dot = document.getElementById('browser-dot');
  if (s.ok) {
    dot.classList.add('online');
    document.getElementById('s-browser').textContent = s.browser_open ? 'Offen' : 'Bereit';
    document.getElementById('s-browser').className = 'value ok';
    document.getElementById('s-reqs').textContent = s.request_count;
    document.getElementById('s-url').textContent = s.current_url || '—';
    const h = Math.floor(s.uptime_seconds / 3600);
    const m = Math.floor((s.uptime_seconds % 3600) / 60);
    const sec = s.uptime_seconds % 60;
    document.getElementById('uptime').textContent = `Uptime: ${h}h ${m}m ${sec}s`;
  } else {
    dot.classList.remove('online');
    document.getElementById('s-browser').textContent = 'OFFLINE';
    document.getElementById('s-browser').className = 'value err';
  }

  // Perplexity Bridge
  try {
    const pr = await fetch(PPLX_URL + '/health', {signal: AbortSignal.timeout(2000)});
    const pd = await pr.json();
    if (pd.status === 'ok') {
      document.getElementById('s-pplx').textContent = 'Online';
      document.getElementById('s-pplx').className = 'value ok';
      document.getElementById('pplx-badge').textContent = 'ONLINE';
      document.getElementById('pplx-badge').className = 'pplx-badge active';
      document.getElementById('pplx-detail').textContent = 'Bridge läuft auf :8319';
    }
  } catch {
    document.getElementById('s-pplx').textContent = 'OFFLINE';
    document.getElementById('s-pplx').className = 'value err';
  }

  // Logs vom Server holen
  const lr = await api('/logs');
  if (lr.logs && lr.logs.length > 0) {
    const lastServer = lr.logs[lr.logs.length - 1];
    // Nur neue Logs hinzufügen (simple check via msg)
    const lastLocal = localLogs.filter(l => l._server).slice(-1)[0];
    if (!lastLocal || lastLocal.msg !== lastServer.msg) {
      lr.logs.slice(-10).forEach(l => {
        if (!localLogs.some(ll => ll.msg === l.msg && ll.ts === l.ts)) {
          localLogs.push({...l, _server: true});
        }
      });
      if (localLogs.length > 200) localLogs = localLogs.slice(-200);
      renderLogs();
    }
  }
}

// ── Tab System ─────────────────────────────────────────────────────────────
function switchTab(name) {
  document.querySelectorAll('.tab').forEach((t,i) => {
    const names = ['navigate','interact','read','eval'];
    t.classList.toggle('active', names[i] === name);
  });
  document.querySelectorAll('.tab-content').forEach(c => {
    c.classList.toggle('active', c.id === 'tab-' + name);
  });
}

// ── Browser Actions ────────────────────────────────────────────────────────
async function doNavigate() {
  const url = document.getElementById('nav-url').value.trim();
  if (!url) return;
  addLog('info', `Navigiere zu ${url}`);
  const r = await api('/navigate', 'POST', {url});
  if (r.ok) addLog('ok', `Geladen: "${r.title}" (${r.url}) HTTP ${r.status}`);
  else addLog('error', `Navigation fehlgeschlagen: ${r.error}`);
}

function quickNav(url) {
  document.getElementById('nav-url').value = url;
  doNavigate();
}

async function doScroll(dir) {
  addLog('info', `Scroll ${dir}`);
  await api('/scroll', 'POST', {direction: dir, amount: 500});
}

async function doClose() {
  addLog('warn', 'Browser wird geschlossen...');
  const r = await api('/close', 'POST');
  if (r.ok) addLog('ok', 'Browser geschlossen');
}

async function doClick() {
  const sel = document.getElementById('click-sel').value.trim();
  const method = document.getElementById('click-method').value;
  if (!sel) return;
  addLog('info', `Click: "${sel}" (${method})`);
  const r = await api('/click', 'POST', {selector: sel, method});
  if (r.ok) addLog('ok', `Geklickt. URL: ${r.current_url}`);
  else addLog('error', `Click fehlgeschlagen: ${r.error}`);
}

async function doType() {
  const sel = document.getElementById('type-sel').value.trim();
  const text = document.getElementById('type-text').value;
  if (!sel) return;
  addLog('info', `Type in "${sel}": "${text.slice(0,30)}"`);
  const r = await api('/type', 'POST', {selector: sel, text, clear_first: true});
  if (r.ok) addLog('ok', 'Text eingegeben');
  else addLog('error', `Type fehlgeschlagen: ${r.error}`);
}

async function doKey(key) {
  addLog('info', `Taste: ${key}`);
  await api('/keyboard', 'POST', {key});
}

async function doGetText() {
  const sel = document.getElementById('read-sel').value.trim() || 'body';
  addLog('info', `Text lesen: ${sel}`);
  const r = await api('/get_text', 'POST', {selector: sel});
  const el = document.getElementById('read-result');
  el.style.display = 'block';
  if (r.ok) {
    el.textContent = r.text + (r.truncated ? '\n\n[... gekürzt]' : '');
    addLog('ok', `${r.text.length} Zeichen gelesen${r.truncated?' (gekürzt)':''}`);
  } else {
    el.textContent = 'Fehler: ' + r.error;
    addLog('error', r.error);
  }
}

async function doScreenshot() {
  addLog('info', 'Screenshot wird gemacht...');
  const r = await api('/screenshot');
  if (r.ok) {
    const img = document.getElementById('screenshot-img');
    img.src = 'data:' + r.mime + ';base64,' + r.image_base64;
    img.style.display = 'block';
    addLog('ok', 'Screenshot geladen');
  } else {
    addLog('error', `Screenshot fehlgeschlagen: ${r.error}`);
  }
}

async function doEval() {
  const script = document.getElementById('eval-script').value.trim();
  if (!script) return;
  addLog('info', `JS eval: ${script.slice(0,60)}`);
  const r = await api('/eval', 'POST', {script});
  const el = document.getElementById('eval-result');
  el.style.display = 'block';
  if (r.ok) { el.textContent = '→ ' + r.result; addLog('ok', r.result.slice(0,100)); }
  else { el.textContent = 'Fehler: ' + r.error; addLog('error', r.error); }
}

// ── Perplexity Quick Test ──────────────────────────────────────────────────
async function testPplx() {
  const query = document.getElementById('pplx-query').value.trim();
  if (!query) return;
  if (!PPLX_KEY) {
    PPLX_KEY = prompt('Perplexity API Key (aus config.yaml):');
    if (PPLX_KEY) localStorage.setItem('pplx_key', PPLX_KEY);
  }
  addLog('info', `Perplexity: "${query}"`);
  const res = document.getElementById('pplx-result');
  res.style.display = 'block';
  res.textContent = '...';
  try {
    const r = await fetch(PPLX_URL + '/v1/chat/completions', {
      method: 'POST',
      headers: {'Content-Type':'application/json','Authorization':'Bearer '+PPLX_KEY},
      body: JSON.stringify({model:'sonar',messages:[{role:'user',content:query}],stream:false})
    });
    const d = await r.json();
    if (d.choices) {
      const answer = d.choices[0].message.content;
      res.textContent = answer.slice(0, 500) + (answer.length > 500 ? '...' : '');
      addLog('ok', `Perplexity Antwort: ${answer.slice(0,80)}...`);
    } else {
      res.textContent = JSON.stringify(d);
      addLog('error', d.error?.message || 'Unbekannter Fehler');
    }
  } catch(e) {
    res.textContent = 'Fehler: ' + e.message;
    addLog('error', 'Perplexity Bridge nicht erreichbar: ' + e.message);
  }
}

// ── Init ───────────────────────────────────────────────────────────────────
addLog('info', 'WebGUI gestartet');
pollStatus();
setInterval(pollStatus, 3000);
</script>
</body>
</html>
